<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineLocal - Your Private Cinema</title>
  
  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Load fonts with display=swap to avoid FOUT -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/style.css">

  <script>
    // Execute immediately before body renders to prevent UI flash
    if (localStorage.getItem('cinelocal_token')) {
      // If they already have a profile selected in this session, go straight to home
      if (sessionStorage.getItem('cinelocal_profile')) {
        window.location.replace('/home.html');
      } else {
        window.location.replace('/profiles.html');
      }
    }
  </script>
</head>
<body>
  <!-- Skip link for keyboard users -->
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <div class="auth-container">
    <div class="auth-card" id="main-content" role="main">
      <!-- Logo -->
      <div class="auth-logo">
        <div class="navbar-logo">
          <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5v14l11-7z"/>
          </svg>
          CineLocal
        </div>
        <p class="auth-tagline">Your private cinema, on any screen.</p>
      </div>

      <!-- Tabs with proper ARIA -->
      <div class="auth-tabs" role="tablist" aria-label="Authentication options">
        <button type="button" class="auth-tab active" id="tab-login" onclick="switchTab('login')" role="tab" aria-selected="true" aria-controls="login-form" tabindex="0">
          Sign In
        </button>
        <button type="button" class="auth-tab" id="tab-register" onclick="switchTab('register')" role="tab" aria-selected="false" aria-controls="register-form" tabindex="-1">
          Register
        </button>
      </div>

      <!-- Login Form -->
      <form id="login-form" role="tabpanel" aria-labelledby="tab-login" style="display: block;">
        <div class="form-group">
          <label class="form-label" for="login-username">Username</label>
          <input 
            type="text" 
            id="login-username" 
            class="form-input" 
            placeholder="Enter your username..."
            required
            autocomplete="username"
            aria-describedby="login-error"
          >
        </div>

        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input 
            type="password" 
            id="login-password" 
            class="form-input" 
            placeholder="Enter your password..."
            required
            autocomplete="current-password"
            aria-describedby="login-error"
          >
        </div>

        <div id="login-error" class="form-error" style="display: none;" role="alert" aria-live="assertive" tabindex="-1"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="login-submit-btn">
          <span id="login-btn-text">Sign In</span>
          <span id="login-spinner" class="spinner" style="display: none;" aria-hidden="true"></span>
        </button>
      </form>

      <!-- Register Form -->
      <form id="register-form" role="tabpanel" aria-labelledby="tab-register" style="display: none;" aria-hidden="true">
        <div class="form-group">
          <label class="form-label" for="register-username">Username</label>
          <input 
            type="text" 
            id="register-username" 
            class="form-input" 
            placeholder="Choose a username (min 3 characters)..."
            required
            autocomplete="username"
            minlength="3"
            aria-describedby="register-username-hint register-error"
          >
          <span id="register-username-hint" class="sr-only">Username must be at least 3 characters</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-password">Password</label>
          <input 
            type="password" 
            id="register-password" 
            class="form-input" 
            placeholder="Choose a password (min 6 characters)..."
            required
            autocomplete="new-password"
            minlength="6"
            aria-describedby="register-password-hint register-error"
          >
          <span id="register-password-hint" class="sr-only">Password must be at least 6 characters</span>
        </div>

        <div class="form-group">
          <label class="form-label" for="register-password-confirm">Confirm Password</label>
          <input 
            type="password" 
            id="register-password-confirm" 
            class="form-input" 
            placeholder="Re-enter your password..."
            required
            autocomplete="new-password"
            minlength="6"
            aria-describedby="register-error"
          >
        </div>

        <div id="register-error" class="form-error" style="display: none;" role="alert" aria-live="assertive" tabindex="-1"></div>

        <button type="submit" class="btn btn-primary" style="width: 100%;" id="register-submit-btn">
          <span id="register-btn-text">Create Account</span>
          <span id="register-spinner" class="spinner" style="display: none;" aria-hidden="true"></span>
        </button>
      </form>
    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    // Tab keyboard navigation
    const tabs = document.querySelectorAll('[role="tab"]');
    tabs.forEach(tab => {
      tab.addEventListener('keydown', (e) => {
        let targetTab;
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          e.preventDefault();
          const currentIndex = [...tabs].indexOf(tab);
          if (e.key === 'ArrowRight') {
            targetTab = tabs[(currentIndex + 1) % tabs.length];
          } else {
            targetTab = tabs[(currentIndex - 1 + tabs.length) % tabs.length];
          }
          targetTab.click();
          targetTab.focus();
        }
      });
    });

    // Switch between login and register tabs
    function switchTab(tab) {
      const loginTab = document.getElementById('tab-login');
      const registerTab = document.getElementById('tab-register');
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');

      if (tab === 'login') {
        loginTab.classList.add('active');
        loginTab.setAttribute('aria-selected', 'true');
        loginTab.setAttribute('tabindex', '0');
        registerTab.classList.remove('active');
        registerTab.setAttribute('aria-selected', 'false');
        registerTab.setAttribute('tabindex', '-1');
        loginForm.style.display = 'block';
        loginForm.removeAttribute('aria-hidden');
        registerForm.style.display = 'none';
        registerForm.setAttribute('aria-hidden', 'true');
      } else {
        registerTab.classList.add('active');
        registerTab.setAttribute('aria-selected', 'true');
        registerTab.setAttribute('tabindex', '0');
        loginTab.classList.remove('active');
        loginTab.setAttribute('aria-selected', 'false');
        loginTab.setAttribute('tabindex', '-1');
        registerForm.style.display = 'block';
        registerForm.removeAttribute('aria-hidden');
        loginForm.style.display = 'none';
        loginForm.setAttribute('aria-hidden', 'true');
      }

      // Clear errors
      document.getElementById('login-error').style.display = 'none';
      document.getElementById('register-error').style.display = 'none';
    }

    // Handle login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('login-username').value;
      const password = document.getElementById('login-password').value;
      const errorDiv = document.getElementById('login-error');
      const btnText = document.getElementById('login-btn-text');
      const spinner = document.getElementById('login-spinner');
      const submitBtn = document.getElementById('login-submit-btn');

      // Show loading
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      submitBtn.setAttribute('aria-busy', 'true');
      submitBtn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        const data = await fetchAPI('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });

        // Save token and user
        setToken(data.token);
        setUser(data.user);

        // Redirect to profiles
        window.location.href = '/profiles.html';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        submitBtn.setAttribute('aria-busy', 'false');
        submitBtn.disabled = false;
        // Focus the error for screen readers
        errorDiv.focus();
      }
    });

    // Handle register
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('register-username').value;
      const password = document.getElementById('register-password').value;
      const passwordConfirm = document.getElementById('register-password-confirm').value;
      const errorDiv = document.getElementById('register-error');
      const btnText = document.getElementById('register-btn-text');
      const spinner = document.getElementById('register-spinner');
      const submitBtn = document.getElementById('register-submit-btn');

      // Validate passwords match
      if (password !== passwordConfirm) {
        errorDiv.textContent = 'Passwords do not match';
        errorDiv.style.display = 'block';
        errorDiv.focus();
        return;
      }

      // Show loading
      btnText.style.display = 'none';
      spinner.style.display = 'inline-block';
      submitBtn.setAttribute('aria-busy', 'true');
      submitBtn.disabled = true;
      errorDiv.style.display = 'none';

      try {
        const data = await fetchAPI('/auth/register', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });

        // Save token and user
        setToken(data.token);
        setUser(data.user);

        // Redirect to profiles
        window.location.href = '/profiles.html';
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btnText.style.display = 'inline';
        spinner.style.display = 'none';
        submitBtn.setAttribute('aria-busy', 'false');
        submitBtn.disabled = false;
        // Focus the error for screen readers
        errorDiv.focus();
      }
    });
  </script>
</body>
</html>
