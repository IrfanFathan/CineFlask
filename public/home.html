<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home - CineLocal</title>
  <meta name="description" content="Browse and watch your movie collection on CineLocal">
  
  <!-- Preconnect to Google Fonts for faster loading -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <!-- Load fonts with display=swap to avoid FOUT -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Skip to main content link for accessibility -->
  <a href="#main-content" class="sr-only focus:not-sr-only" style="position:absolute;top:0;left:0;padding:1rem;background:var(--accent);color:white;z-index:9999;">
    Skip to main content
  </a>

  <!-- Navigation -->
  <nav class="navbar" id="navbar" role="navigation" aria-label="Main navigation">
    <div class="navbar-content">
      <a href="/home.html" class="navbar-logo" aria-label="CineLocal - Go to home">
        <svg width="28" height="28" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M8 5v14l11-7z"/>
        </svg>
        CineLocal
      </a>

      <div class="navbar-actions">
        <div class="navbar-search" role="search">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input 
            type="search" 
            id="search-input" 
            placeholder="Search movies & series…" 
            autocomplete="off"
            aria-label="Search movies and series"
          >
        </div>

        <a href="/upload.html" class="btn btn-primary" style="margin-right: 8px;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"></path>
          </svg>
          <span class="btn-text-desktop">Upload Movie</span>
          <span class="btn-text-mobile sr-only">Upload Movie</span>
        </a>

        <a href="/upload-series.html" class="btn btn-primary">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="2" y="7" width="20" height="15" rx="2" ry="2"></rect>
            <polyline points="17 2 12 7 7 2"></polyline>
          </svg>
          <span class="btn-text-desktop">Upload Series</span>
          <span class="btn-text-mobile sr-only">Upload Series</span>
        </a>

        <!-- User menu dropdown -->
        <div class="dropdown" data-dropdown id="user-dropdown">
          <button 
            class="user-avatar dropdown__trigger" 
            id="user-avatar" 
            aria-label="User menu"
            aria-haspopup="true"
            aria-expanded="false"
            aria-controls="user-menu"
          >
            <!-- Profile initial -->
          </button>

          <div 
            id="user-menu" 
            class="dropdown__menu" 
            role="menu" 
            aria-labelledby="user-avatar"
          >
            <button class="dropdown__item" role="menuitem" onclick="window.location.href='/admin.html'" id="admin-menu-btn" style="display:none;">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6M5.64 5.64l4.24 4.24m4.24 4.24l4.24 4.24M1 12h6m6 0h6M5.64 18.36l4.24-4.24m4.24-4.24l4.24-4.24"></path>
              </svg>
              Admin Dashboard
            </button>
            <button class="dropdown__item" role="menuitem" onclick="switchProfile()">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              Switch Profile
            </button>
            <hr class="dropdown__divider">
            <button class="dropdown__item dropdown__item--danger" role="menuitem" onclick="logout()">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"></path>
              </svg>
              Logout
            </button>
          </div>
        </div>
      </div>
    </div>
  </nav>

  <div class="navbar-spacer"></div>

  <!-- Filters Bar -->
  <aside class="filters-bar" id="filters-bar" role="region" aria-label="Filter options" style="background: var(--bg-card); border-bottom: 1px solid var(--border); padding: var(--space-md) var(--space-2xl); position: sticky; top: 60px; z-index: 100; display: none;">
    <div style="max-width: 1400px; margin: 0 auto;">
      <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--space-md);">
        
        <!-- Filters -->
        <div style="display: flex; align-items: center; gap: var(--space-md); flex-wrap: wrap; flex: 1;">
          <!-- Genre Filter -->
          <div class="form-group" style="margin-bottom: 0;">
            <label for="filter-genre" class="sr-only">Filter by genre</label>
            <select id="filter-genre" class="form-input" style="width: auto; min-width: 150px;" aria-label="Filter by genre">
              <option value="">All Genres</option>
              <option value="Action">Action</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Horror">Horror</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Thriller">Thriller</option>
              <option value="Romance">Romance</option>
              <option value="Adventure">Adventure</option>
              <option value="Animation">Animation</option>
              <option value="Crime">Crime</option>
              <option value="Fantasy">Fantasy</option>
              <option value="Mystery">Mystery</option>
            </select>
          </div>

          <!-- Year Range -->
          <div style="display: flex; align-items: center; gap: var(--space-sm);">
            <label for="filter-year-min" class="sr-only">Year from</label>
            <input type="number" id="filter-year-min" class="form-input" placeholder="Year from" style="width: 100px;" min="1900" max="2030" aria-label="Year from">
            <span style="color: var(--text-muted);" aria-hidden="true">-</span>
            <label for="filter-year-max" class="sr-only">Year to</label>
            <input type="number" id="filter-year-max" class="form-input" placeholder="Year to" style="width: 100px;" min="1900" max="2030" aria-label="Year to">
          </div>

          <!-- Rating Filter -->
          <div style="display: flex; align-items: center; gap: var(--space-sm);">
            <label for="filter-rating" style="color: var(--text-secondary); font-size: var(--text-sm); white-space: nowrap;">Min Rating:</label>
            <input type="number" id="filter-rating" class="form-input" placeholder="0.0" style="width: 80px;" min="0" max="10" step="0.1" aria-describedby="rating-hint">
            <span id="rating-hint" class="sr-only">Enter a minimum IMDb rating between 0 and 10</span>
          </div>

          <!-- Language Filter -->
          <div class="form-group" style="margin-bottom: 0;">
            <label for="filter-language" class="sr-only">Filter by language</label>
            <select id="filter-language" class="form-input" style="width: auto; min-width: 120px;" aria-label="Filter by language">
              <option value="">All Languages</option>
              <option value="English">English</option>
              <option value="Spanish">Spanish</option>
              <option value="French">French</option>
              <option value="German">German</option>
              <option value="Japanese">Japanese</option>
              <option value="Korean">Korean</option>
              <option value="Hindi">Hindi</option>
              <option value="Italian">Italian</option>
            </select>
          </div>

          <!-- Clear Filters Button -->
          <button class="btn btn-secondary" id="clear-filters-btn" style="white-space: nowrap;" aria-label="Clear all filters">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
            Clear
          </button>
        </div>

        <!-- Sort -->
        <div style="display: flex; align-items: center; gap: var(--space-sm);">
          <label for="sort-by" style="color: var(--text-secondary); font-size: var(--text-sm); white-space: nowrap;">Sort By:</label>
          <select id="sort-by" class="form-input" style="width: auto; min-width: 140px;">
            <option value="created_at">Date Added</option>
            <option value="title">Title</option>
            <option value="year">Year</option>
            <option value="imdb_rating">Rating</option>
          </select>
          <button class="btn btn-secondary" id="sort-order-btn" aria-label="Toggle sort direction" style="padding: 8px 12px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" id="sort-icon" aria-hidden="true">
              <path d="m7 16 5 5 5-5M7 8l5-5 5 5"></path>
            </svg>
          </button>
        </div>
      </div>

      <!-- Active Filters Display -->
      <div id="active-filters" style="margin-top: var(--space-sm); display: none;" role="status" aria-live="polite">
        <div style="display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap;">
          <span style="font-size: var(--text-sm); color: var(--text-muted);">Active filters:</span>
          <div id="filter-tags" style="display: flex; gap: var(--space-sm); flex-wrap: wrap;"></div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Hero Banner -->
  <section class="hero" id="hero-section" style="display: none;" aria-label="Featured movie">
    <img id="hero-bg" class="hero-background" alt="" width="1920" height="1080" loading="eager">
    <div class="hero-content">
      <img id="hero-poster" class="hero-poster" alt="" width="300" height="450" loading="eager">
      <div class="hero-info">
        <h1 class="hero-title" id="hero-title"></h1>
        <div class="hero-metadata" id="hero-metadata"></div>
        <p class="hero-description" id="hero-description"></p>
        <div class="hero-actions">
          <button class="btn btn-primary" id="hero-play-btn">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M8 5v14l11-7z"/>
            </svg>
            Play
          </button>
          <button class="btn btn-secondary" id="hero-info-btn">
            <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="10"></circle>
              <path d="M12 16v-4M12 8h.01"></path>
            </svg>
            More Info
          </button>
        </div>
      </div>
    </div>
  </section>

  <main class="container" id="main-content">
    <!-- Loading State -->
    <div id="loading-state" class="loading-container" style="display: none;" role="status" aria-live="polite">
      <div class="movie-grid">
        <!-- Skeleton cards will be inserted here -->
      </div>
    </div>

    <!-- Continue Watching -->
    <section class="section" id="continue-watching-section" style="display: none;" aria-labelledby="continue-watching-title">
      <div class="section-header">
        <h2 class="section-title" id="continue-watching-title">Continue Watching</h2>
      </div>
      <div class="scroll-row" id="continue-watching-row" role="list"></div>
    </section>

    <!-- My Watchlist -->
    <section class="section" id="watchlist-section" style="display: none;" aria-labelledby="watchlist-title">
      <div class="section-header">
        <h2 class="section-title" id="watchlist-title">My Watchlist</h2>
      </div>
      <div class="scroll-row" id="watchlist-row" role="list"></div>
    </section>

    <!-- All Movies -->
    <section class="section" aria-labelledby="movies-title">
      <div class="section-header">
        <h2 class="section-title" id="movies-title">All Movies</h2>
        <span id="movies-count" class="section-count" aria-live="polite"></span>
      </div>
      <div class="movie-grid" id="movies-grid" role="list" aria-busy="false"></div>
      
      <!-- Empty State -->
      <div id="movies-empty" class="empty-state" style="display: none;">
        <svg class="empty-state__icon" width="64" height="64" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path>
        </svg>
        <h3 class="empty-state__title">No movies found</h3>
        <p class="empty-state__description">Try adjusting your filters or upload your first movie.</p>
        <a href="/upload.html" class="btn btn-primary">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"></path>
          </svg>
          Upload Movie
        </a>
      </div>
    </section>

    <!-- TV Series -->
    <section class="section" id="series-section" aria-labelledby="series-title">
      <div class="section-header">
        <h2 class="section-title" id="series-title">TV Series</h2>
        <span id="series-count" class="section-count" aria-live="polite"></span>
      </div>
      <div class="movie-grid" id="series-grid" role="list" aria-busy="false"></div>
    </section>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="/js/utils.js"></script>
  <!-- New components -->
  <script src="/js/state.js"></script>
  <script src="/js/a11y.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/skeleton.js"></script>
  <script src="/js/components/dropdown.js"></script>
  <script>
    requireAuth();

    const profile = getProfile();
    if (!profile) {
      window.location.href = '/profiles.html';
    }

    // Update user avatar
    document.getElementById('user-avatar').textContent = getInitials(profile.profile_name);
    document.getElementById('user-avatar').style.background = profile.avatar_color;

    // Initialize dropdown
    Dropdown.initAll();

    // Register keyboard shortcuts
    if (window.A11y) {
      A11y.registerShortcut('/', () => {
        document.getElementById('search-input').focus();
      }, 'Focus search');
      
      A11y.registerShortcut('Escape', () => {
        Dropdown.closeAll();
      }, 'Close menus');
    }

    let allMovies = [];
    let allSeries = [];
    let continueWatchingMovies = [];
    let continueWatchingSeries = [];
    let watchlistMovies = [];
    let watchlistSeries = [];
    let heroMovieIndex = 0;

    // Filter state
    let currentFilters = {
      genre: '',
      year_min: '',
      year_max: '',
      rating_min: '',
      language: '',
      sort_by: 'created_at',
      sort_order: 'DESC'
    };

    // Get filter elements
    const filterGenre = document.getElementById('filter-genre');
    const filterYearMin = document.getElementById('filter-year-min');
    const filterYearMax = document.getElementById('filter-year-max');
    const filterRating = document.getElementById('filter-rating');
    const filterLanguage = document.getElementById('filter-language');
    const sortBy = document.getElementById('sort-by');
    const sortOrderBtn = document.getElementById('sort-order-btn');
    const clearFiltersBtn = document.getElementById('clear-filters-btn');
    const filtersBar = document.getElementById('filters-bar');
    const activeFiltersDiv = document.getElementById('active-filters');
    const filterTagsDiv = document.getElementById('filter-tags');

    // Show filters bar when there's content
    function showFiltersBar() {
      if (allMovies.length > 0 || allSeries.length > 0) {
        filtersBar.style.display = 'block';
      }
    }

    // Build query string from filters
    function buildFilterQuery() {
      const params = new URLSearchParams();
      params.append('profile_id', profile.id);
      
      if (currentFilters.genre) params.append('genre', currentFilters.genre);
      if (currentFilters.year_min) params.append('year_min', currentFilters.year_min);
      if (currentFilters.year_max) params.append('year_max', currentFilters.year_max);
      if (currentFilters.rating_min) params.append('rating_min', currentFilters.rating_min);
      if (currentFilters.language) params.append('language', currentFilters.language);
      if (currentFilters.sort_by) params.append('sort_by', currentFilters.sort_by);
      if (currentFilters.sort_order) params.append('sort_order', currentFilters.sort_order);

      return params.toString();
    }

    // Apply filters
    async function applyFilters() {
      try {
        showLoading();
        
        // Update filter state
        currentFilters.genre = filterGenre.value;
        currentFilters.year_min = filterYearMin.value;
        currentFilters.year_max = filterYearMax.value;
        currentFilters.rating_min = filterRating.value;
        currentFilters.language = filterLanguage.value;
        currentFilters.sort_by = sortBy.value;

        const query = buildFilterQuery();

        // Fetch filtered movies
        const moviesData = await fetchAPI(`/movies?${query}`);
        allMovies = moviesData.movies;

        // Fetch filtered series
        const seriesData = await fetchAPI(`/series?${query}`);
        allSeries = seriesData.series || [];

        // Re-render movies and series
        renderMovies();
        renderSeries();
        
        // Update active filters display
        updateActiveFilters();
        
        // Announce to screen readers
        if (window.A11y) {
          A11y.announce(`Found ${allMovies.length} movies and ${allSeries.length} series`);
        }

        hideLoading();
      } catch (error) {
        hideLoading();
        if (window.Toast) {
          Toast.error(error.message);
        } else {
          showToast(error.message, 'error');
        }
      }
    }

    // Update active filters display
    function updateActiveFilters() {
      filterTagsDiv.innerHTML = '';
      let hasFilters = false;

      if (currentFilters.genre) {
        addFilterTag('Genre', currentFilters.genre);
        hasFilters = true;
      }
      if (currentFilters.year_min || currentFilters.year_max) {
        const yearRange = `${currentFilters.year_min || '?'} - ${currentFilters.year_max || '?'}`;
        addFilterTag('Year', yearRange);
        hasFilters = true;
      }
      if (currentFilters.rating_min) {
        addFilterTag('Rating', `≥ ${currentFilters.rating_min}`);
        hasFilters = true;
      }
      if (currentFilters.language) {
        addFilterTag('Language', currentFilters.language);
        hasFilters = true;
      }

      activeFiltersDiv.style.display = hasFilters ? 'block' : 'none';
    }

    function addFilterTag(label, value) {
      const tag = document.createElement('div');
      tag.style.cssText = 'display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; background: var(--accent); color: white; border-radius: 4px; font-size: var(--text-xs);';
      tag.innerHTML = `<span>${label}: ${value}</span>`;
      filterTagsDiv.appendChild(tag);
    }

    // Clear all filters
    function clearFilters() {
      filterGenre.value = '';
      filterYearMin.value = '';
      filterYearMax.value = '';
      filterRating.value = '';
      filterLanguage.value = '';
      sortBy.value = 'created_at';
      currentFilters.sort_order = 'DESC';
      updateSortIcon();
      applyFilters();
    }

    // Toggle sort order
    function toggleSortOrder() {
      currentFilters.sort_order = currentFilters.sort_order === 'DESC' ? 'ASC' : 'DESC';
      updateSortIcon();
      applyFilters();
    }

    function updateSortIcon() {
      const sortIcon = document.getElementById('sort-icon');
      if (currentFilters.sort_order === 'ASC') {
        sortIcon.innerHTML = '<path d="m7 15 5 5 5-5M7 9l5-5 5 5"></path><line x1="12" y1="19" x2="12" y2="4"></line>';
      } else {
        sortIcon.innerHTML = '<path d="m7 16 5 5 5-5M7 8l5-5 5 5"></path>';
      }
    }

    // Attach filter event listeners
    filterGenre.addEventListener('change', applyFilters);
    filterYearMin.addEventListener('change', debounce(applyFilters, 500));
    filterYearMax.addEventListener('change', debounce(applyFilters, 500));
    filterRating.addEventListener('change', debounce(applyFilters, 500));
    filterLanguage.addEventListener('change', applyFilters);
    sortBy.addEventListener('change', applyFilters);
    sortOrderBtn.addEventListener('click', toggleSortOrder);
    clearFiltersBtn.addEventListener('click', clearFilters);

    // Check if user is admin
    function checkAdminStatus() {
      try {
        const token = localStorage.getItem('token');
        if (!token) return;
        const payload = JSON.parse(atob(token.split('.')[1]));
        if (payload.id === 1) { // Assuming user ID 1 is admin
          const adminBtn = document.getElementById('admin-menu-btn');
          if (adminBtn) {
            adminBtn.style.display = 'block';
          }
        }
      } catch (e) {
        console.error('Error parsing token', e);
      }
    }

    // Load all data
    async function loadData() {
      checkAdminStatus();
      
      // Show skeleton loading
      const moviesGrid = document.getElementById('movies-grid');
      if (window.Skeleton) {
        Skeleton.showMovieGrid(moviesGrid, 12);
      }
      
      try {
        const query = buildFilterQuery();

        // Fetch all movies
        const moviesData = await fetchAPI(`/movies?${query}`);
        allMovies = moviesData.movies;

        // Fetch all series
        const seriesData = await fetchAPI(`/series?${query}`);
        allSeries = seriesData.series || [];

        // Fetch continue watching movies
        const progressData = await fetchAPI(`/progress?profile_id=${profile.id}`);
        continueWatchingMovies = progressData.movies;

        // Fetch continue watching series (in-progress episodes)
        const seriesProgressData = await fetchAPI(`/progress/episode/in-progress?profile_id=${profile.id}`);
        continueWatchingSeries = seriesProgressData.series || [];

        // Fetch watchlist movies
        const watchlistData = await fetchAPI(`/watchlist?profile_id=${profile.id}`);
        watchlistMovies = watchlistData.movies;

        // Fetch watchlist series
        const seriesWatchlistData = await fetchAPI(`/watchlist/series?profile_id=${profile.id}`);
        watchlistSeries = seriesWatchlistData.series || [];

        // Hide skeleton
        if (window.Skeleton) {
          Skeleton.hide(moviesGrid);
        }

        renderAll();
        showFiltersBar(); // Show filters after data loads
      } catch (error) {
        // Hide skeleton on error
        if (window.Skeleton) {
          Skeleton.hide(moviesGrid);
        }
        
        if (window.Toast) {
          Toast.error(error.message);
        } else {
          showToast(error.message, 'error');
        }
      }
    }

    function renderAll() {
      renderHero();
      renderContinueWatching();
      renderWatchlist();
      renderMovies();
      renderSeries();
    }

    function renderHero() {
      if (allMovies.length === 0) return;

      // Get latest 5 movies for hero rotation
      const heroMovies = allMovies.slice(0, 5);
      const movie = heroMovies[heroMovieIndex % heroMovies.length];

      document.getElementById('hero-section').style.display = 'flex';
      document.getElementById('hero-bg').src = movie.poster_url || '';
      document.getElementById('hero-poster').src = movie.poster_url || '';
      document.getElementById('hero-poster').alt = movie.title + ' poster';
      document.getElementById('hero-title').textContent = movie.title;
      
      const metadata = [
        movie.year,
        movie.runtime,
        movie.imdb_rating ? `⭐ ${movie.imdb_rating}` : null
      ].filter(Boolean).join(' · ');
      
      document.getElementById('hero-metadata').textContent = metadata;
      document.getElementById('hero-description').textContent = movie.description;

      document.getElementById('hero-play-btn').onclick = () => {
        window.location.href = `/player.html?id=${movie.id}`;
      };

      document.getElementById('hero-info-btn').onclick = () => {
        window.location.href = `/movie.html?id=${movie.id}`;
      };

      // Auto-rotate hero every 8 seconds
      setTimeout(() => {
        heroMovieIndex++;
        renderHero();
      }, 8000);
    }

    function renderContinueWatching() {
      // Merge movies and series in-progress
      const allContinueWatching = [
        ...continueWatchingMovies.map(m => ({ ...m, type: 'movie' })),
        ...continueWatchingSeries.map(s => ({ ...s, type: 'series' }))
      ];

      if (allContinueWatching.length === 0) {
        document.getElementById('continue-watching-section').style.display = 'none';
        return;
      }

      document.getElementById('continue-watching-section').style.display = 'block';
      const row = document.getElementById('continue-watching-row');
      row.innerHTML = allContinueWatching.map(item => {
        if (item.type === 'movie') {
          return createMovieCard(item, item.progress_percentage);
        } else {
          // Series card with episode info
          return createSeriesCard(item, {
            episode_number: item.episode_number,
            season_number: item.season_number,
            progress_percentage: item.progress_percentage
          });
        }
      }).join('');
    }

    function renderWatchlist() {
      // Merge movies and series watchlists
      const allWatchlist = [
        ...watchlistMovies.map(m => ({ ...m, type: 'movie' })),
        ...watchlistSeries.map(s => ({ ...s, type: 'series' }))
      ];

      if (allWatchlist.length === 0) {
        document.getElementById('watchlist-section').style.display = 'none';
        return;
      }

      document.getElementById('watchlist-section').style.display = 'block';
      const row = document.getElementById('watchlist-row');
      row.innerHTML = allWatchlist.map(item => {
        if (item.type === 'movie') {
          return createMovieCard(item);
        } else {
          return createSeriesCard(item);
        }
      }).join('');
    }

    function renderMovies() {
      const grid = document.getElementById('movies-grid');
      const emptyState = document.getElementById('movies-empty');
      const countEl = document.getElementById('movies-count');
      
      if (allMovies.length === 0) {
        grid.innerHTML = '';
        grid.style.display = 'none';
        emptyState.style.display = 'flex';
        countEl.textContent = '';
        return;
      }
      
      grid.style.display = 'grid';
      emptyState.style.display = 'none';
      countEl.textContent = `(${allMovies.length})`;
      grid.innerHTML = allMovies.map(movie => createMovieCard(movie)).join('');
    }

    function renderSeries() {
      const grid = document.getElementById('series-grid');
      const section = document.getElementById('series-section');
      const countEl = document.getElementById('series-count');
      
      if (allSeries.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      countEl.textContent = `(${allSeries.length})`;
      grid.innerHTML = allSeries.map(s => createSeriesCard(s)).join('');
    }

    // Search functionality
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', debounce(async (e) => {
      const query = e.target.value.trim();
      
      if (!query) {
        // Reapply current filters
        applyFilters();
        return;
      }

      try {
        showLoading();
        
        // Build query with filters and search term
        const filterQuery = buildFilterQuery();
        const searchQuery = `q=${encodeURIComponent(query)}&${filterQuery}`;

        // Search movies
        const moviesData = await fetchAPI(`/movies?${searchQuery}`);
        allMovies = moviesData.movies;

        // Search series
        const seriesData = await fetchAPI(`/series?${searchQuery}`);
        allSeries = seriesData.series || [];

        renderMovies();
        renderSeries();
        
        // Announce results to screen readers
        if (window.A11y) {
          A11y.announce(`Found ${allMovies.length} movies and ${allSeries.length} series for "${query}"`);
        }
        
        hideLoading();
      } catch (error) {
        hideLoading();
        if (window.Toast) {
          Toast.error(error.message);
        } else {
          showToast(error.message, 'error');
        }
      }
    }, 300));

    // Navbar scroll effect
    let lastScroll = 0;
    window.addEventListener('scroll', () => {
      const navbar = document.getElementById('navbar');
      const currentScroll = window.pageYOffset;

      if (currentScroll > 50) {
        navbar.classList.remove('transparent');
      } else {
        navbar.classList.add('transparent');
      }

      lastScroll = currentScroll;
    });

    function switchProfile() {
      sessionStorage.removeItem('cinelocal_profile');
      window.location.href = '/profiles.html';
    }

    loadData();
  </script>
</body>
</html>
